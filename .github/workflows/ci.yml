name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test (Nix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      # Builds the kid package via the flake. The custom Setup.hs generates the
      # Futhark C, the Futhark package deps are fetched purely by Nix, and the
      # hspec test suite runs as part of the build (doCheck), so this single
      # step compiles and tests the project.
      - name: nix build
        run: nix build .#kid --print-build-logs

      # Evaluates the flake outputs (packages, devShell, app) so breakage there
      # is caught too.
      - name: nix flake check
        run: nix flake check --print-build-logs
